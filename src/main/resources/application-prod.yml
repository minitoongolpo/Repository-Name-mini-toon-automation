# Production Profile Configuration
server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    root: WARN
    com.minitoon: INFO
  file:
    name: /app/logs/application.log
