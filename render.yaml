services:
  - type: web
    name: minitoon-automation
    runtime: docker
    plan: standard
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: minitoon-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: LEONARDO_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_ACCOUNT_ID
        sync: false
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SPRING_PROFILES_ACTIVE
        value: "prod"
    healthCheckPath: /api/v1/status/health
    autoDeploy: true

  - type: cron
    name: minitoon-daily-gen
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    schedule: "0 6 * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: minitoon-db
          property: connectionString
    startCommand: curl -X POST https://$RENDER_EXTERNAL_HOSTNAME/api/v1/videos/generate

  - type: cron
    name: minitoon-daily-upload
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    schedule: "0 8 * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: minitoon-db
          property: connectionString
    startCommand: curl -X POST https://$RENDER_EXTERNAL_HOSTNAME/api/v1/videos/upload

databases:
  - name: minitoon-db
    plan: standard
    databaseName: minitoon
    user: postgres
